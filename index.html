<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bricola.md</title>
  <link rel="stylesheet" href="styles/app.css">
</head>
<body>
  <header class="topbar">
    <button id="btn-toggle-sidebar" class="btn" title="サイドバー折りたたみ">«</button>
    <span class="brand">Bricola<span class="brand-ext">.md</span></span>
    <button id="btn-open" class="btn">リポジトリを選択</button>
    <button id="btn-restore" class="btn" hidden></button>
    <span id="dirty" class="dirty"></span>
    <span id="status" class="status"></span>
    <span class="spacer"></span>
    <button id="btn-edit" class="btn">編集</button>
    <button id="btn-mode" class="btn">コード</button>
    <button id="btn-save" class="btn" disabled>保存</button>
    <button id="btn-reload" class="btn">再読み込み</button>
    <button id="btn-toggle-outline" class="btn" title="アウトライン折りたたみ">»</button>
    <button id="btn-theme" class="btn" title="ダーク/ライト切替">◐</button>
  </header>

  <main class="layout">
    <nav class="sidebar sidebar-left" aria-label="ファイル一覧">
      <div class="pane-head">
        <h2 class="pane-title">ファイル</h2>
        <button id="btn-clear-sel" class="btn-mini" hidden>選択解除</button>
      </div>
      <input id="file-search" class="file-search" type="search" placeholder="ファイル検索" />
      <div id="file-list" class="file-list"></div>
    </nav>

    <section class="content">
      <article id="preview" class="markdown-body"></article>
      <textarea id="code" class="code-editor" spellcheck="false" hidden></textarea>
    </section>

    <aside class="sidebar sidebar-right" aria-label="アウトライン">
      <h2 class="pane-title">アウトライン</h2>
      <ul id="outline" class="outline"></ul>
    </aside>
  </main>

  <!-- WYSIWYG → md 変換の確認モーダル (ADR-0002) -->
  <div id="convert-modal" class="modal" hidden>
    <div class="modal-box">
      <h3 class="modal-title">プレビュー編集を Markdown に反映</h3>
      <div id="convert-warnings" class="modal-warnings"></div>
      <p class="modal-note">以下の Markdown に変換されます。元の記法が変わる場合があります。</p>
      <pre id="convert-preview" class="modal-pre"></pre>
      <div class="modal-actions">
        <button id="convert-cancel" class="btn">取り消す</button>
        <button id="convert-apply" class="btn btn-primary">反映する</button>
      </div>
    </div>
  </div>

  <!-- 同梱ライブラリ (ADR-0004): file:// で動かすため classic script -->
  <script src="vendor/marked.min.js"></script>
  <script src="vendor/purify.min.js"></script>
  <script src="vendor/js-yaml.min.js"></script>
  <script src="vendor/turndown.js"></script>
  <script src="vendor/turndown-plugin-gfm.js"></script>
  <script src="vendor/mermaid.min.js"></script>

  <!-- アプリ本体 (classic script / Bricola 名前空間) -->
  <script src="app/glob.js"></script>
  <script src="app/config.js"></script>
  <script src="app/repository.js"></script>
  <script src="app/docstate.js"></script>
  <script src="app/render.js"></script>
  <script src="app/mermaid.js"></script>
  <script src="app/editor.js"></script>
  <script src="app/assets.js"></script>
  <script src="app/tableui.js"></script>
  <script src="app/outline.js"></script>
  <script src="app/theme.js"></script>
  <script src="app/main.js"></script>
</body>
</html>
